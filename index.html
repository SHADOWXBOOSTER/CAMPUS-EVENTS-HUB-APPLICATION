<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Events Hub - Event Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .stats-bar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-item .label {
            color: #666;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            background: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .content-area {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-height: 400px;
        }

        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .event-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border-left: 5px solid #667eea;
        }

        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .event-card h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .event-info {
            color: #666;
            margin: 5px 0;
            font-size: 0.95em;
        }

        .event-details {
            background: rgba(255,255,255,0.7);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-style: italic;
        }

        .capacity-bar {
            background: #e0e0e0;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .capacity-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8em;
            font-weight: bold;
        }

        .register-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .register-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .register-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-content h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }

        .btn-submit:hover {
            transform: scale(1.05);
        }

        .btn-cancel:hover {
            background: #ccc;
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .club-card {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .club-card h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .committee-list {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.5);
            border-radius: 8px;
        }

        .committee-member {
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .committee-member:last-child {
            border-bottom: none;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .event-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Campus Events Hub</h1>
            <p>Event Management System - Java OOP Project</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="number" id="totalEvents">0</div>
                <div class="label">Total Events</div>
            </div>
            <div class="stat-item">
                <div class="number" id="totalRegistered">0</div>
                <div class="label">Total Registered</div>
            </div>
            <div class="stat-item">
                <div class="number" id="totalCapacity">0</div>
                <div class="label">Total Capacity</div>
            </div>
            <div class="stat-item">
                <div class="number" id="occupancy">0%</div>
                <div class="label">Occupancy Rate</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('all')">All Events</button>
            <button class="tab" onclick="showTab('hackathons')">Hackathons</button>
            <button class="tab" onclick="showTab('fests')">Fests</button>
            <button class="tab" onclick="showTab('seminars')">Seminars</button>
            <button class="tab" onclick="showTab('sports')">Sports</button>
            <button class="tab" onclick="showTab('clubs')">Clubs</button>
        </div>

        <div class="content-area">
            <div class="success-message" id="successMessage">
                ✓ Registration successful!
            </div>
            <div id="eventContainer"></div>
        </div>
    </div>

    <div class="modal" id="registerModal">
        <div class="modal-content">
            <h2>Register for Event</h2>
            <div class="form-group">
                <label>Event Name:</label>
                <input type="text" id="modalEventName" readonly>
            </div>
            <div class="form-group">
                <label>Your Name:</label>
                <input type="text" id="participantName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="participantEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Student ID:</label>
                <input type="text" id="studentId" placeholder="Enter your student ID">
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-submit" onclick="submitRegistration()">Register</button>
            </div>
        </div>
    </div>

    <script>
        // Simulated Java backend data (demonstrating OOP concepts)
        const eventsData = {
            hackathons: [
                {
                    id: 1,
                    name: "AI Innovation Challenge",
                    date: "2024-12-15",
                    venue: "Tech Lab A",
                    capacity: 100,
                    registered: 45,
                    category: "Hackathon",
                    theme: "Artificial Intelligence",
                    teamSize: 4,
                    prizePool: "$5000"
                },
                {
                    id: 2,
                    name: "Web Dev Sprint",
                    date: "2024-12-20",
                    venue: "Computer Center",
                    capacity: 80,
                    registered: 62,
                    category: "Hackathon",
                    theme: "Full Stack Development",
                    teamSize: 3,
                    prizePool: "$3000"
                }
            ],
            fests: [
                {
                    id: 3,
                    name: "TechFest 2024",
                    date: "2024-12-10",
                    venue: "Main Auditorium",
                    capacity: 500,
                    registered: 320,
                    category: "Fest",
                    festType: "Technical & Cultural",
                    days: 3
                },
                {
                    id: 4,
                    name: "Cultural Carnival",
                    date: "2025-01-05",
                    venue: "Open Ground",
                    capacity: 1000,
                    registered: 450,
                    category: "Fest",
                    festType: "Cultural",
                    days: 2
                }
            ],
            seminars: [
                {
                    id: 5,
                    name: "Future of Cloud Computing",
                    date: "2024-12-08",
                    venue: "Seminar Hall 1",
                    capacity: 150,
                    registered: 128,
                    category: "Seminar",
                    speaker: "Dr. Sarah Johnson",
                    topic: "Cloud Architecture & DevOps"
                },
                {
                    id: 6,
                    name: "Entrepreneurship Workshop",
                    date: "2024-12-12",
                    venue: "Conference Room",
                    capacity: 100,
                    registered: 85,
                    category: "Seminar",
                    speaker: "Mr. Raj Malhotra",
                    topic: "Startup Fundamentals"
                }
            ],
            sports: [
                {
                    id: 7,
                    name: "Inter-College Cricket",
                    date: "2024-12-18",
                    venue: "Sports Complex",
                    capacity: 200,
                    registered: 156,
                    category: "Sports",
                    sportType: "Cricket"
                },
                {
                    id: 8,
                    name: "Basketball Tournament",
                    date: "2024-12-22",
                    venue: "Indoor Stadium",
                    capacity: 150,
                    registered: 98,
                    category: "Sports",
                    sportType: "Basketball"
                }
            ],
            clubs: [
                {
                    id: 1,
                    name: "Coding Club",
                    description: "Programming and Development",
                    committee: [
                        { position: "President", name: "Alex Kumar", contact: "alex@campus.edu" },
                        { position: "Vice President", name: "Priya Sharma", contact: "priya@campus.edu" }
                    ],
                    events: [
                        {
                            id: 9,
                            name: "Code Sprint",
                            date: "2024-12-25",
                            venue: "Lab 3",
                            capacity: 50,
                            registered: 32
                        }
                    ]
                },
                {
                    id: 2,
                    name: "Robotics Club",
                    description: "Build and Design Robots",
                    committee: [
                        { position: "President", name: "Mike Chen", contact: "mike@campus.edu" }
                    ],
                    events: [
                        {
                            id: 10,
                            name: "Robo Wars",
                            date: "2024-12-28",
                            venue: "Workshop",
                            capacity: 60,
                            registered: 28
                        }
                    ]
                }
            ]
        };

        let currentEventId = null;

        function getAllEvents() {
            return [
                ...eventsData.hackathons,
                ...eventsData.fests,
                ...eventsData.seminars,
                ...eventsData.sports,
                ...eventsData.clubs.flatMap(club => club.events.map(e => ({...e, clubName: club.name})))
            ];
        }

        function updateStatistics() {
            const allEvents = getAllEvents();
            const totalEvents = allEvents.length;
            const totalRegistered = allEvents.reduce((sum, e) => sum + e.registered, 0);
            const totalCapacity = allEvents.reduce((sum, e) => sum + e.capacity, 0);
            const occupancy = totalCapacity > 0 ? ((totalRegistered / totalCapacity) * 100).toFixed(1) : 0;

            document.getElementById('totalEvents').textContent = totalEvents;
            document.getElementById('totalRegistered').textContent = totalRegistered;
            document.getElementById('totalCapacity').textContent = totalCapacity;
            document.getElementById('occupancy').textContent = occupancy + '%';
        }

        function createEventCard(event) {
            const percentage = (event.registered / event.capacity) * 100;
            const isFull = event.registered >= event.capacity;
            
            let details = '';
            if (event.theme) {
                details = `Theme: ${event.theme} | Team Size: ${event.teamSize} | Prize: ${event.prizePool}`;
            } else if (event.festType) {
                details = `Type: ${event.festType} | Duration: ${event.days} days`;
            } else if (event.speaker) {
                details = `Speaker: ${event.speaker} | Topic: ${event.topic}`;
            } else if (event.sportType) {
                details = `Sport: ${event.sportType}`;
            } else if (event.clubName) {
                details = `Club: ${event.clubName}`;
            }

            return `
                <div class="event-card">
                    <h3>${event.name}</h3>
                    <div class="event-info">📅 ${event.date}</div>
                    <div class="event-info">📍 ${event.venue}</div>
                    ${details ? `<div class="event-details">${details}</div>` : ''}
                    <div class="capacity-bar">
                        <div class="capacity-fill" style="width: ${percentage}%">
                            ${event.registered}/${event.capacity}
                        </div>
                    </div>
                    <button class="register-btn" 
                            onclick="openRegisterModal(${event.id}, '${event.name}')"
                            ${isFull ? 'disabled' : ''}>
                        ${isFull ? 'Event Full' : 'Register Now'}
                    </button>
                </div>
            `;
        }

        function createClubCard(club) {
            return `
                <div class="club-card">
                    <h3>🏛️ ${club.name}</h3>
                    <p style="color: #666; margin-bottom: 15px;">${club.description}</p>
                    
                    <div class="committee-list">
                        <strong>Committee Members:</strong>
                        ${club.committee.map(m => `
                            <div class="committee-member">
                                <strong>${m.position}:</strong> ${m.name} (${m.contact})
                            </div>
                        `).join('')}
                    </div>

                    <h4 style="margin-top: 20px; color: #333;">Upcoming Events:</h4>
                    <div class="event-grid" style="margin-top: 15px;">
                        ${club.events.map(e => createEventCard({...e, clubName: club.name})).join('')}
                    </div>
                </div>
            `;
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            const container = document.getElementById('eventContainer');
            let content = '';

            switch(tab) {
                case 'all':
                    content = '<div class="event-grid">' + getAllEvents().map(createEventCard).join('') + '</div>';
                    break;
                case 'hackathons':
                    content = '<div class="event-grid">' + eventsData.hackathons.map(createEventCard).join('') + '</div>';
                    break;
                case 'fests':
                    content = '<div class="event-grid">' + eventsData.fests.map(createEventCard).join('') + '</div>';
                    break;
                case 'seminars':
                    content = '<div class="event-grid">' + eventsData.seminars.map(createEventCard).join('') + '</div>';
                    break;
                case 'sports':
                    content = '<div class="event-grid">' + eventsData.sports.map(createEventCard).join('') + '</div>';
                    break;
                case 'clubs':
                    content = eventsData.clubs.map(createClubCard).join('');
                    break;
            }

            container.innerHTML = content;
        }

        function openRegisterModal(eventId, eventName) {
            currentEventId = eventId;
            document.getElementById('modalEventName').value = eventName;
            document.getElementById('participantName').value = '';
            document.getElementById('participantEmail').value = '';
            document.getElementById('studentId').value = '';
            document.getElementById('registerModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('registerModal').classList.remove('active');
        }

        function submitRegistration() {
            const name = document.getElementById('participantName').value;
            const email = document.getElementById('participantEmail').value;
            const studentId = document.getElementById('studentId').value;

            if (!name || !email || !studentId) {
                alert('Please fill in all fields!');
                return;
            }

            // Find and update the event
            const allEvents = getAllEvents();
            const event = allEvents.find(e => e.id === currentEventId);
            
            if (event && event.registered < event.capacity) {
                event.registered++;
                
                closeModal();
                
                // Show success message
                const successMsg = document.getElementById('successMessage');
                successMsg.classList.add('show');
                setTimeout(() => successMsg.classList.remove('show'), 3000);

                // Refresh the display
                updateStatistics();
                document.querySelector('.tab.active').click();
            }
        }

        // Initialize
        updateStatistics();
        showTab('all');
    </script>
</body>
</html>
